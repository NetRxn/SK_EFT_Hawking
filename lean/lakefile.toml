name = "sk-eft-hawking"
defaultTargets = ["SKEFTHawking"]

[leanOptions]
autoImplicit = false

# Pinned to the Mathlib commit that Aristotle uses for best sorry-filling compatibility.
# See: https://aristotle.harmonic.fun/dashboard/docs/toolchain
[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "8f9d9cff6bd728b17a24e163c9402775d9e6a365"

[[lean_lib]]
name = "SKEFTHawking"

[[lean_exe]]
name = "extractDeps"
root = "SKEFTHawking.ExtractDeps"
# NOTE: Native linking may exceed macOS argument-length limits with Mathlib.
# Use interpreted mode instead: `lake env lean --run SKEFTHawking/ExtractDeps.lean`
