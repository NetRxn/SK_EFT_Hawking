name = "sk-eft-hawking"
# Default target is the SKEFTHawking library. The `extractDeps` executable
# target (see below) is NOT in defaultTargets because its native-link step
# exceeds macOS's argument-length limit when pulling Mathlib .c.o files.
#
# For Python consumers (scripts/extract_lean_deps.py, validate.py, dashboard),
# the .olean is what matters — Python invokes it via `lake env lean --run`
# (interpreted mode), not via the compiled binary. The .olean is built by
# `lake build SKEFTHawking.ExtractDeps` (no link), which is the canonical
# "build ExtractDeps output" command.
#
# Trustworthy clean baseline after a structural change:
#   rm -rf .lake/build && lake build SKEFTHawking.ExtractDeps
# This single command builds the library + the ExtractDeps .olean cleanly.
# See CLAUDE.md and docs/WAVE_EXECUTION_PIPELINE.md.
defaultTargets = ["SKEFTHawking"]

[leanOptions]
autoImplicit = false

# Pinned to Mathlib's v4.29.1 tag (5e932f97, 2026-04-17). Previous: 8850ed93 (v4.29.0 first commit, 2026-04-04).
# Previous Aristotle-compatible pin: 8f9d9cff (v4.28.0). See: https://aristotle.harmonic.fun/dashboard/docs/toolchain
# Bumped 2026-05-14 to align with PhysLib (leanprover-community/physlib) for downstream consumers.
[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "5e932f97dd25535344f80f9dd8da3aab83df0fe6"

# Lean REPL binary. The leanprover-community/repl repo skipped a v4.29.1 tag
# (jumped directly v4.29.0 -> v4.30.0-rc1); v4.29.0 build is patch-level
# compatible with Lean v4.29.1 since the REPL is a thin protocol wrapper.
# Built into .lake/packages/repl/.lake/build/bin/repl where lean-lsp-mcp auto-discovers it.
# Zero transitive deps, cannot conflict with Mathlib.
[[require]]
name = "repl"
git = "https://github.com/leanprover-community/repl.git"
rev = "v4.29.0"

[[lean_lib]]
name = "SKEFTHawking"

[[lean_exe]]
name = "extractDeps"
root = "SKEFTHawking.ExtractDeps"
# NOTE: Native linking may exceed macOS argument-length limits with Mathlib.
# Use interpreted mode instead: `lake env lean --run SKEFTHawking/ExtractDeps.lean`
