[project]
name = "sk-eft-hawking-paper"
version = "0.1.0"
description = "Dissipative EFT Corrections to Analog Hawking Radiation: Computation and Formalization"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "aristotlelib>=1.0.0",
    "numpy>=2.0",
    "scipy>=1.14",
    "pytest>=8.0",
    # Visualization
    "plotly>=6.0",
    "kaleido>=1.0",
    # Notebook
    "jupyter>=1.1",
    "ipykernel>=6.29",
    "ipywidgets>=8.1",
    "nbformat>=5.10",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
