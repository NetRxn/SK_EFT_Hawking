[project]
name = "sk-eft-hawking"
version = "0.2.0"
description = "Dissipative EFT Corrections to Analog Hawking Radiation: Computation and Formalization"
authors = [
    { name = "John Roehm" },
]
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    # Core scientific
    "numpy>=2.0",
    "scipy>=1.14",
    # Aristotle theorem prover
    "aristotlelib>=1.0.0",
    # Symbolic math (Phase 2 WKB expansion)
    "sympy>=1.12",
    "mpmath>=1.3",
    # Visualization
    "plotly>=6.0",
    "kaleido>=1.0",
    # Notebooks
    "jupyter>=1.1",
    "ipykernel>=6.29",
    "ipywidgets>=8.1",
    "nbformat>=5.10",
    # Testing
    "pytest>=8.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
